<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Usagi Chase</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='48' x='6' font-size='42'%3E%E5%85%94%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #272019;
      --paper: #fffaf2;
      --panel: rgba(255, 250, 242, 0.84);
      --panel-strong: rgba(255, 250, 242, 0.94);
      --line: rgba(39, 32, 25, 0.18);
      --mint: #70d6c9;
      --coral: #ff8a72;
      --lemon: #ffe071;
      --sky: #6bb7ff;
      --berry: #d95c91;
      --shadow: rgba(31, 21, 12, 0.18);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #77cbe3;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0) 35%),
        linear-gradient(135deg, #8ce0df 0%, #f9dd89 48%, #ffa98f 100%);
    }

    #video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: min(440px, calc(100vw - 24px));
      pointer-events: none;
    }

    .badge {
      width: fit-content;
      max-width: 100%;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 13px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--lemon);
      box-shadow: 0 0 0 3px rgba(255, 224, 113, 0.28);
      flex: 0 0 auto;
    }

    .badge.ok .status-dot {
      background: var(--mint);
      box-shadow: 0 0 0 3px rgba(112, 214, 201, 0.28);
    }

    .toolbar {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      top: max(12px, env(safe-area-inset-top));
      z-index: 8;
      display: flex;
      gap: 8px;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--ink);
      display: grid;
      place-items: center;
      box-shadow: 0 8px 22px var(--shadow);
      cursor: pointer;
      padding: 0;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(39, 32, 25, 0.34);
      outline: 0;
    }

    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.2;
    }

    .icon-button.playing {
      background: #fff3c6;
      border-color: rgba(255, 138, 114, 0.68);
      color: #7a392f;
    }

    .settings {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      top: calc(max(12px, env(safe-area-inset-top)) + 52px);
      z-index: 7;
      width: min(330px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 16px 42px rgba(31, 21, 12, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 12px;
      max-height: calc(100vh - 82px);
      overflow: auto;
      transform-origin: top right;
      transform: scale(0.98);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .settings.open {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .field label,
    .field-title {
      font-size: 12px;
      font-weight: 700;
      color: rgba(39, 32, 25, 0.76);
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .character-button {
      min-height: 54px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    .character-button[aria-pressed="true"] {
      border-color: rgba(39, 32, 25, 0.48);
      background: #fff3c6;
    }

    .character-button:hover {
      transform: translateY(-1px);
    }

    .face-chip {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: #fff;
      border: 1px solid rgba(39, 32, 25, 0.14);
    }

    .character-name {
      display: block;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
    }

    .character-note {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: rgba(39, 32, 25, 0.6);
      line-height: 1.15;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: rgba(39, 32, 25, 0.7);
      font-weight: 800;
      cursor: pointer;
    }

    .segmented button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper);
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 46px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--coral);
    }

    .value {
      text-align: right;
      font-size: 12px;
      font-weight: 800;
      color: rgba(39, 32, 25, 0.7);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 6;
      width: min(560px, calc(100vw - 24px));
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease, transform 0.24s ease;
      display: flex;
      justify-content: center;
    }

    .hint.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hint span {
      display: inline-block;
      max-width: 100%;
      padding: 11px 16px;
      border: 1px solid rgba(39, 32, 25, 0.16);
      border-radius: 8px;
      background: rgba(39, 32, 25, 0.84);
      color: #fffaf2;
      box-shadow: 0 12px 30px rgba(31, 21, 12, 0.24);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.24;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .start-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 250, 242, 0.66), rgba(255, 250, 242, 0.18)),
        linear-gradient(135deg, #84d7e9, #f8d867 52%, #ff9f8a);
      transition: opacity 0.3s ease;
    }

    .start-layer.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-panel {
      width: min(440px, calc(100vw - 28px));
      border: 1px solid rgba(39, 32, 25, 0.16);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.88);
      box-shadow: 0 18px 48px rgba(31, 21, 12, 0.22);
      padding: 18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    .start-face {
      width: 132px;
      height: 132px;
      margin: 0 auto 12px;
      position: relative;
    }

    .start-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .start-copy {
      margin: 10px 0 16px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(39, 32, 25, 0.72);
    }

    .primary-action {
      min-height: 44px;
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: var(--paper);
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .secondary-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .secondary-row button {
      flex: 1;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      top: auto;
      bottom: max(72px, calc(env(safe-area-inset-bottom) + 72px));
      left: 50%;
      z-index: 18;
      transform: translateX(-50%) scale(0.96);
      min-width: min(320px, calc(100vw - 32px));
      max-width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.94);
      box-shadow: 0 18px 42px rgba(31, 21, 12, 0.24);
      color: var(--ink);
      padding: 14px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 750;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @media (max-width: 720px) {
      .hud {
        right: 108px;
        max-width: calc(100vw - 132px);
      }

      .badge {
        min-height: 31px;
        padding: 6px 9px;
        font-size: 12px;
      }

      .toolbar {
        gap: 6px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
      }

      .settings {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: max(12px, env(safe-area-inset-bottom));
        width: auto;
        max-height: calc(100vh - 24px);
        transform-origin: bottom right;
      }

      .hint {
        bottom: max(12px, env(safe-area-inset-bottom));
      }

      .hint span {
        font-size: 14px;
      }

      .start-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="scene"></canvas>
  </main>

  <div class="hud" aria-live="polite">
    <div class="badge" id="statusBadge"><span class="status-dot"></span><span id="statusText">等待开始</span></div>
    <div class="badge ok"><span class="status-dot"></span><span id="moodText">乌萨奇在憋不住要动</span></div>
  </div>

  <div class="toolbar">
    <button class="icon-button" id="musicBtn" type="button" aria-label="切换音乐" title="切换音乐">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
    </button>
    <button class="icon-button" id="settingsBtn" type="button" aria-label="打开设置" title="打开设置" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.4 1.05V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-.4-1.05 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1.05-.4H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.05-.4 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .4-1.05V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 .4 1.05 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.24.35.6.6 1 .6H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.05.4c-.28.2-.48.55-.46 1Z" />
      </svg>
    </button>
  </div>

  <section class="settings" id="settingsPanel" aria-label="设置">
    <h2 class="panel-title">设置 <span id="activeName">乌萨奇</span></h2>
    <div class="field">
      <div class="field-title">角色</div>
      <div class="character-grid" id="characterGrid"></div>
    </div>
    <div class="field">
      <div class="field-title">输入</div>
      <div class="segmented">
        <button type="button" id="cameraModeBtn" aria-pressed="true">摄像头</button>
        <button type="button" id="touchModeBtn" aria-pressed="false">触摸</button>
      </div>
    </div>
    <div class="field">
      <label for="energyRange">活泼度</label>
      <div class="range-row">
        <input id="energyRange" type="range" min="70" max="135" value="110" />
        <span class="value" id="energyValue">110%</span>
      </div>
    </div>
  </section>

  <div class="hint" id="hint"><span id="hintText">呀哈！</span></div>
  <div class="toast" id="toast"></div>

  <section class="start-layer" id="startLayer" aria-label="开始">
    <div class="start-panel">
      <canvas class="start-face" id="startFace" width="264" height="264"></canvas>
      <h1 class="start-title">居家遛乌萨奇</h1>

        <button id="startMusicBtn" type="button">先开音乐</button>

    </div>
  </section>

      function resize() {
        state.width = window.innerWidth;

        state.dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = state.width + 'px';
        canvas.style.height = state.height + 'px';
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        bgCanvas.width = canvas.width;

      function setMood(mood, force = false) {
        const now = performance.now();
        if (!force && now < state.moodLockUntil && mood !== state.mood) return;
        if (mood !== state.mood || force) {
          state.mood = mood;
          state.moodTimer = 0;
          state.moodStartedAt = now;
          moodText.textContent = currentCharacter().labels[mood] || '';
          if (force || now - state.lastLineAt > 700) showLine(mood);
        }
      }

      function showLine(mood) {
        const character = currentCharacter();
        const lines = character.lines[mood] || character.lines.idle;
        hintText.textContent = pick(lines);
        hint.classList.add('show');
        state.lastLineAt = performance.now();
        clearTimeout(showLine.timer);
        showLine.timer = setTimeout(() => hint.classList.remove('show'), 1450);
        spawnBubble(buddy.x + buddy.facing * 36, buddy.y - 118, hintText.textContent, character);
      }

      function createCharacterButtons() {
        characterGrid.innerHTML = '';
        const orderedCharacters = ['usagi', 'hachiware', 'chiikawa', 'bigMouse', 'meji', 'puppy']

          .filter(Boolean);
        for (const character of orderedCharacters) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'character-button';
          button.dataset.character = character.id;
          button.innerHTML = `
            <span class="face-chip">${character.chip}</span>
            <span>
              <span class="character-name">${character.name}</span>
              <span class="character-note">${character.note}</span>
            </span>
          `;
          button.addEventListener('click', () => {
            state.characterId = character.id;
            buddy.spin = 0;
            spawnPop(buddy.x, buddy.y - 50, character);
            updateCharacterButtons();
            showLine('idle');
          });
          characterGrid.appendChild(button);
        }
        updateCharacterButtons();
      }

      function drawStartFace() {
        startFaceCtx.clearRect(0, 0, startFace.width, startFace.height);
        startFaceCtx.save();
        startFaceCtx.scale(2, 2);
        drawStickerCharacter(startFaceCtx, 66, 88, 1.12, currentCharacter(), {
          mood: 'idle',

          blink: 0,

          spin: 0,
          shy: currentCharacter().temperament === 'shy' ? 0.55 : 0,

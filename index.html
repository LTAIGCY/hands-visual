        });
        startFaceCtx.restore();
      }

      function paintStaticBackdrop(now) {
        const w = state.width;
        const h = state.height;
        const t = now / 1000;
        bgCtx.clearRect(0, 0, w, h);

        const g = bgCtx.createLinearGradient(0, 0, w, h);
        g.addColorStop(0, '#87dce8');
        g.addColorStop(0.48, '#f6db76');
        g.addColorStop(1, '#ff9d88');
        bgCtx.fillStyle = g;
        bgCtx.fillRect(0, 0, w, h);

        bgCtx.save();
        bgCtx.globalAlpha = 0.2;
        bgCtx.fillStyle = '#ffffff';
        for (let i = 0; i < 10; i++) {
          const x = ((i * 173 + t * 18) % (w + 140)) - 70;
          const y = 50 + (i % 5) * 52 + Math.sin(t + i) * 8;
          drawCloud(bgCtx, x, y, 0.68 + (i % 3) * 0.13);
        }
        bgCtx.restore();

        bgCtx.save();
        bgCtx.fillStyle = 'rgba(255, 255, 255, 0.24)';
        for (let i = 0; i < 8; i++) {
          const x = (i * 151 + Math.sin(t * 0.7 + i) * 16) % (w + 100) - 40;
          const y = h * 0.74 + Math.cos(t * 0.9 + i) * 12;
          bgCtx.beginPath();
          bgCtx.ellipse(x, y, 84, 18, -0.18, 0, TAU);
          bgCtx.fill();
        }
        bgCtx.restore();
        state.backdropDirty = false;
        state.lastBackdropPaint = now;
      }

      function drawBackdrop(now = performance.now()) {
        const w = state.width;
        const h = state.height;
        if (state.mode === 'camera' && video.readyState >= 2 && video.videoWidth && video.videoHeight) {
          ctx.save();
          ctx.fillStyle = '#7fd8dc';
          ctx.fillRect(0, 0, w, h);
          const vw = video.videoWidth;
          const vh = video.videoHeight;
          const scale = Math.max(w / vw, h / vh);
          const dw = vw * scale;
          const dh = vh * scale;
          const dx = (w - dw) / 2;
          const dy = (h - dh) / 2;
          ctx.translate(w, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(video, dx, dy, dw, dh);
          ctx.restore();
          ctx.save();
          ctx.fillStyle = 'rgba(255, 250, 242, 0.13)';
          ctx.fillRect(0, 0, w, h);
          ctx.restore();
          return;
        }

        if (state.backdropDirty || now - state.lastBackdropPaint > 96) {
          paintStaticBackdrop(now);
        }
        ctx.drawImage(bgCanvas, 0, 0, w, h);
      }

      function drawCloud(targetCtx, x, y, s) {
        targetCtx.beginPath();
        targetCtx.ellipse(x, y + 10 * s, 38 * s, 15 * s, 0, 0, TAU);
        targetCtx.ellipse(x + 26 * s, y + 7 * s, 30 * s, 14 * s, 0, 0, TAU);
        targetCtx.ellipse(x - 26 * s, y + 9 * s, 26 * s, 13 * s, 0, 0, TAU);
        targetCtx.ellipse(x + 5 * s, y - 2 * s, 29 * s, 19 * s, 0, 0, TAU);
        targetCtx.fill();
      }

      function drawTarget() {
        const now = performance.now();
        const age = now - state.lastSeen;
        const displayTarget = state.targetActive ? state.target : (age < 1450 ? state.target : age < 2400 ? state.ghostTarget : null);
        if (!displayTarget) return;
        const t = now / 1000;
        const x = displayTarget.x;
        const y = displayTarget.y;
        const baseAlpha = state.targetActive ? 1 : clamp(1 - age / 2400, 0.12, 0.44);
        ctx.save();
        for (let i = 0; i < 3; i++) {
          const p = (t * 1.3 + i * 0.33) % 1;
          ctx.globalAlpha = baseAlpha * 0.42 * (1 - p);
          ctx.strokeStyle = i === 0 ? '#fffaf2' : '#ff8a72';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, 12 + p * 42, 0, TAU);
          ctx.stroke();
        }
        ctx.globalAlpha = baseAlpha;
        ctx.fillStyle = '#fffaf2';
        ctx.shadowColor = '#ff8a72';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function updateBuddy(dt) {
        const character = currentCharacter();
        const energy = state.energy / 100;
        const now = performance.now();
        state.moodTimer += dt;
        buddy.phase += dt * (7.2 + energy * 3.1) * character.bounce;
        buddy.blinkAt -= dt;
        if (buddy.blinkAt <= 0) {
          buddy.blink = 1;
          buddy.blinkAt = 2.2 + Math.random() * 2.6;
        }
        buddy.blink = Math.max(0, buddy.blink - dt * 8);

        const seenAge = now - state.lastSeen;
        let target = state.targetActive ? state.target : null;
        let targetIsMemory = false;

        if (!target && state.target && seenAge < 1450) {
          target = state.target;
          targetIsMemory = true;
        } else if (!target && state.ghostTarget && seenAge < 2400) {
          target = state.ghostTarget;
          targetIsMemory = true;
        }

        if (targetIsMemory) {
          if (!state.lostStartedAt) state.lostStartedAt = now;
          state.targetVelocity.x *= 0.86;
          state.targetVelocity.y *= 0.86;
        }

        if (!target && seenAge > 2400) {
          state.targetActive = false;
          state.target = null;
          state.ghostTarget = null;
          state.rawTarget = null;
        }

        let d = Infinity;
        let dx = 0;
        let dy = 0;
        if (target) {
          const leadX = state.targetVelocity.x * 0.34;
          const leadY = state.targetVelocity.y * 0.18;
          const targetOffsetY = character.shape === 'bigMouse' ? 56 : character.shape === 'meji' ? 46 : 42;
          dx = target.x + leadX - buddy.x;
          dy = target.y + targetOffsetY + leadY - buddy.y;
          d = Math.hypot(dx, dy);
        }

        const close = target && d < 104;
        if (close) {
          if (!state.closeSince) state.closeSince = now;
          if (now - state.closeSince > 360) state.closeMemory = now;
        } else if (target) {
          state.closeSince = 0;
        }

        const targetFresh = target && !targetIsMemory && seenAge < 190;
        const pulledAway = targetFresh && state.previousDistance !== null && state.previousDistance < 92 && d > 230 && (d - state.previousDistance > 76 || Math.hypot(state.targetVelocity.x, state.targetVelocity.y) > 30);
        const canAskQuestion = now - state.lastQuestionAt > 7000;
        if (pulledAway && canAskQuestion && now > state.moodLockUntil) {
          setMood('teased', true);
          state.questionUntil = now + 1250;
          state.lastQuestionAt = now;
          state.moodLockUntil = now + (character.temperament === 'wild' ? 900 : 1300);
          for (let i = 0; i < 5; i++) spawnSpark(buddy.x, buddy.y - 60, character, 'teased');
        } else if (target) {
          if (targetIsMemory) {
            setMood(seenAge < 1320 ? 'chase' : 'idle');
          } else {
            const speed = Math.hypot(state.targetVelocity.x, state.targetVelocity.y);
            if (d < 64 && speed < 5.8) setMood('excited');
            else if (d < 148 && speed < 6.2) setMood('sniff');
            else setMood('chase');
          }
        } else if (state.hasSeenTarget && seenAge > 3200) {
          setMood('lost');
          if (!state.lostQuestionShown && now - state.lastQuestionAt > 7000) {
            state.questionUntil = now + 1200;
            state.lastQuestionAt = now;
            state.lostQuestionShown = true;
          }
        } else {
          setMood('idle');
        }

        state.previousDistance = target ? d : null;

        if (state.mood === 'excited' && target) {
          const radius = (32 + 10 * Math.sin(buddy.phase * 0.7)) * character.orbit;
          const orbitSpeed = (character.temperament === 'wild' ? 3.4 : 2.05) * energy;
          buddy.spin += dt * orbitSpeed;
          const ox = target.x + Math.cos(buddy.spin) * radius;
          const oy = target.y + 42 + Math.sin(buddy.spin) * radius * 0.62;
          const odx = ox - buddy.x;
          const ody = oy - buddy.y;
          buddy.vx += odx * 0.082 * character.speed * energy;
          buddy.vy += ody * 0.082 * character.speed * energy;
          buddy.facing = Math.cos(buddy.spin) > 0 ? 1 : -1;
          buddy.jump = Math.max(buddy.jump, 10 + Math.abs(Math.sin(buddy.phase * 2)) * 9);
          if (Math.random() < 0.1) spawnSpark(buddy.x, buddy.y - 70, character, 'happy');
        } else if (target && state.mood !== 'teased') {
          const ux = dx / (d || 1);
          const uy = dy / (d || 1);
          const farBoost = clamp((d - 90) / 260, 0, 1);
          const arrival = clamp(d / 150, 0.24, 1);
          const baseAccel = (state.mood === 'sniff' ? 0.3 : 0.82 + farBoost * 0.92) * character.speed * energy * arrival;
          buddy.vx += ux * baseAccel;
          buddy.vy += uy * baseAccel;
          if (state.mood === 'chase' && d > 160) {
            buddy.vx += state.targetVelocity.x * 0.018;
            buddy.vy += state.targetVelocity.y * 0.012;
          }
          if (Math.abs(dx) > 12) buddy.facing = dx >= 0 ? 1 : -1;
        } else if (state.mood === 'teased') {
          buddy.vx += Math.sin(buddy.phase * 1.4) * 0.12 * character.speed;
          buddy.vy += Math.cos(buddy.phase * 1.7) * 0.08;
          if (character.temperament === 'wild') buddy.jump = Math.max(buddy.jump, 18);
        } else {
          const homeX = state.width * 0.5 + Math.sin(now / 1800) * Math.min(90, state.width * 0.12);
          const homeY = state.height * 0.68 + Math.sin(now / 2600) * 22;
          const hdx = homeX - buddy.x;
          const hdy = homeY - buddy.y;
          const hd = Math.hypot(hdx, hdy);
          if (hd > 24) {
            buddy.vx += (hdx / hd) * 0.12;
            buddy.vy += (hdy / hd) * 0.12;
          }
          if (character.temperament === 'wild' && Math.random() < 0.006) {
            buddy.jump = 28;
            showLine('idle');
          }
        }

        const cap = (state.mood === 'chase' ? 15.5 : state.mood === 'excited' ? 12.5 : 9.2) * character.speed * energy;
        const speedNow = Math.hypot(buddy.vx, buddy.vy);
        if (speedNow > cap) {
          buddy.vx = buddy.vx / speedNow * cap;
          buddy.vy = buddy.vy / speedNow * cap;
        }

        const damp = state.mood === 'chase' ? 0.89 : state.mood === 'excited' ? 0.84 : 0.82;
        buddy.vx *= damp;
        buddy.vy *= damp;
        buddy.x += buddy.vx;
        buddy.y += buddy.vy;
        buddy.jump = Math.max(0, buddy.jump - dt * 92);

        const marginX = Math.max(52, Math.min(90, state.width * 0.09));
        buddy.x = clamp(buddy.x, marginX, state.width - marginX);
        buddy.y = clamp(buddy.y, 94, state.height - 48);

        if (Math.hypot(buddy.vx, buddy.vy) > 5 && Math.random() < 0.16) {
          spawnDust(buddy.x - buddy.facing * 30, buddy.y + 38, character);
        }

        if (now > state.nextIdleLine) {
          if (!target && Math.random() < 0.5) showLine(state.mood);
          state.nextIdleLine = now + 4300 + Math.random() * 4800;
        }
      }

      function drawBuddy() {
        const character = currentCharacter();
        const speed = Math.hypot(buddy.vx, buddy.vy);
        const runPower = state.mood === 'chase' ? clamp(Math.max(speed / 12, 0.58), 0, 1) : 0;
        const runPhase = buddy.phase * (1.18 + runPower * 0.52);
        const runLift = Math.abs(Math.sin(runPhase * 2)) * (6 + speed * 1.1) * character.bounce * runPower;
        const moodLift = state.mood === 'excited' ? Math.abs(Math.sin(buddy.phase * 2.4)) * 15 * character.bounce : 0;
        const action = runPower > 0.12 ? 'run' : state.mood === 'excited' ? 'spin' : state.mood === 'sniff' ? 'sniff' : state.mood === 'teased' ? 'teased' : state.mood;
        const lean = runPower * 0.22 * buddy.facing;
        const scale = (Math.min(state.width, state.height) < 560 ? 0.78 : 1) * character.size;
        drawStickerCharacter(ctx, buddy.x, buddy.y - runLift - moodLift - buddy.jump, scale, character, {
          mood: state.mood,
          facing: buddy.facing,
          phase: buddy.phase,
          runPhase,
          runPower,
          action,
          lean,
          speed,
          blink: buddy.blink,
          showQuestion: performance.now() < state.questionUntil,
          squish: speed > 3 ? Math.sin(runPhase * 2) * 0.08 * runPower : 0,
          spin: buddy.spin,
          shy: character.temperament === 'shy' ? (state.mood === 'sniff' || state.mood === 'excited' ? 0.35 : 0.65) : 0,
          jump: buddy.jump
        });
      }

      function drawStickerCharacter(targetCtx, x, y, s, character, pose) {
        const p = character.palette;
        const mood = pose.mood;
        const phase = pose.phase;
        const runPhase = pose.runPhase || phase;
        const runPower = pose.runPower || 0;
        const action = pose.action || mood;
        const facing = pose.facing || 1;
        const blink = pose.blink || 0;
        const speedSquish = pose.squish || 0;
        const strideBob = Math.abs(Math.sin(runPhase * 2)) * runPower;
        const excitedTilt = mood === 'excited' ? Math.sin(phase * 2.4) * 0.16 : 0;
        const chaseTilt = (pose.lean || 0) + Math.sin(runPhase * 2) * 0.06 * runPower;
        const stickerSquish = speedSquish + strideBob * 0.055 + (mood === 'excited' ? Math.sin(phase * 3.2) * 0.05 : 0);

        targetCtx.save();
        targetCtx.translate(x, y);
        targetCtx.scale(s * facing, s);
        targetCtx.rotate(excitedTilt + chaseTilt);

        targetCtx.save();
        targetCtx.translate(0, -strideBob * 5);
        targetCtx.scale(1 + stickerSquish * 0.75, 1 - stickerSquish * 0.62);
        targetCtx.globalAlpha = 0.24;
        targetCtx.fillStyle = '#17120f';
        targetCtx.beginPath();
        targetCtx.ellipse(-runPower * 8, 50 + strideBob * 5, 48 + runPower * 9, 12, 0, 0, TAU);
        targetCtx.fill();
        targetCtx.globalAlpha = 1;

        if (action === 'run') drawRunStreaks(targetCtx, p, runPhase, runPower);

        const shape = character.shape || character.id;
        if (shape === 'usagi') drawStickerUsagi(targetCtx, p, mood, phase, blink, pose);
        else if (shape === 'hachiware') drawStickerHachiware(targetCtx, p, mood, phase, blink, pose);
        else if (shape === 'chiikawa') drawStickerChiikawa(targetCtx, p, mood, phase, blink, pose);
        else if (shape === 'yellowDog') drawStickerYellowDog(targetCtx, p, mood, phase, blink, pose);
        else if (shape === 'bigMouse') drawStickerBigMouse(targetCtx, p, mood, phase, blink, pose);
        else if (shape === 'meji') drawStickerMeji(targetCtx, p, mood, phase, blink, pose);
        else drawStickerChiikawa(targetCtx, p, mood, phase, blink, pose);

        if (mood === 'excited') drawStickerOrbitDots(targetCtx, p, phase);
        if (pose.showQuestion) drawQuestionPop(targetCtx, p, phase);
        if (mood === 'sniff') drawSniffMarks(targetCtx, p, phase);
        targetCtx.restore();
        targetCtx.restore();
      }

      function drawStickerUsagi(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        const wag = Math.sin(phase * 1.7) * (mood === 'chase' || mood === 'excited' ? 7 : 2) + step * runPower * 10;
        drawLongEar(c, -24, -69 + runPower * 4, -0.12 + wag * 0.008 - runPower * 0.18, p.body, p.earInner, p.line);
        drawLongEar(c, 24, -69 - runPower * 2, 0.12 - wag * 0.008 - runPower * 0.12, p.body, p.earInner, p.line);
        drawOvalBody(c, 0, -13, 43 + runPower * 3, 49 - runPower * 2, p.body, p.line, 5);
        drawSideFur(c, p.line, -34, 1);
        drawSideFur(c, p.line, 34, -1);
        drawTinyArms(c, p, mood, phase, -30, 31, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerFace(c, p, mood, blink, {
          eyes: [[-15, -21], [15, -21]],
          mouth: [0, -3],
          nose: null,
          style: 'rabbit'
        });
        drawCheeks(c, p.blush, -27, -8, 27, -8);
      }

      function drawStickerHachiware(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        drawCatEar(c, -28, -48 + step * runPower * 2, -1, p.body, p.earInner, p.line, phase, mood);
        drawCatEar(c, 28, -48 - step * runPower * 2, 1, p.body, p.earInner, p.line, phase, mood);
        drawOvalBody(c, 0, -13, 45 + runPower * 2, 49 - runPower, p.body, p.line, 5);
        c.save();
        c.beginPath();
        c.moveTo(-41, -37);
        c.bezierCurveTo(-21, -56, -7, -31, 0, -14);
        c.bezierCurveTo(8, -31, 21, -56, 41, -37);
        c.lineTo(39, -4);
        c.bezierCurveTo(22, -12, 10, -8, 0, 8);
        c.bezierCurveTo(-10, -8, -22, -12, -39, -4);
        c.closePath();
        outline(c, p.patch, p.line, 2.2);
        c.restore();
        c.save();
        c.fillStyle = p.body;
        c.beginPath();
        c.ellipse(0, -10, 28, 31, 0, 0, TAU);
        c.fill();
        c.restore();
        drawHachiwareCapLine(c, p);
        drawTinyArms(c, p, mood, phase, -31, 31, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerFace(c, p, mood, blink, {
          eyes: [[-15, -18], [15, -18]],
          mouth: [0, 2],
          nose: null,
          style: 'cat'
        });
        drawCheeks(c, p.blush, -29, -4, 29, -4);
      }

      function drawStickerChiikawa(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        drawRoundEar(c, -25, -47 + step * runPower * 2, 12, 17, p.body, p.earInner, p.line);
        drawRoundEar(c, 25, -47 - step * runPower * 2, 12, 17, p.body, p.earInner, p.line);
        drawOvalBody(c, 0, -12, 43 + runPower * 2, 48 - runPower, p.body, p.line, 5);
        drawSideFur(c, p.line, -34, 1);
        drawSideFur(c, p.line, 34, -1);
        const timid = mood === 'teased' || mood === 'lost';
        drawTinyArms(c, p, mood, phase, timid ? -18 : -31, timid ? 18 : 31, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerFace(c, p, mood, blink, {
          eyes: [[-14, -18], [14, -18]],
          mouth: [0, 3],
          nose: null,
          style: 'shy'
        });
        drawCheeks(c, p.blush, -27, -4, 27, -4);
      }

      function drawStickerYellowDog(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        const earLift = Math.sin(phase * 1.6) * (mood === 'chase' ? 6 : 2) + step * runPower * 5;
        drawFlopEar(c, -33, -35 + earLift, -0.55, p.body, p.earInner, p.line);
        drawFlopEar(c, 33, -35 - earLift, 0.55, p.body, p.earInner, p.line);
        drawOvalBody(c, 0, -11, 47 + runPower * 3, 52 - runPower * 2, p.body, p.line, 5);
        c.beginPath();
        c.ellipse(0, 9, 33, 30, 0, 0, TAU);
        outline(c, p.patch, p.line, 2.6);
        drawTinyArms(c, p, mood, phase, -36, 36, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerEyes(c, p.line, blink, mood, -17, -21, 17, -21, 8.8, 11.5);
        drawCheeks(c, p.blush, -31, -4, 31, -4);
        c.fillStyle = p.line;
        c.beginPath();
        c.ellipse(0, -6, 6, 5, 0, 0, TAU);
        c.fill();
        drawHappyMouth(c, p.line, 0, 1, mood === 'excited' || mood === 'chase');
      }

      function drawStickerBigMouse(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        drawRoundEar(c, -34, -51 + step * runPower * 2, 20, 21, p.body, p.earInner, p.line);
        drawRoundEar(c, 34, -51 - step * runPower * 2, 20, 21, p.body, p.earInner, p.line);
        drawOvalBody(c, 0, -12, 53 + runPower * 2, 53 - runPower, p.body, p.line, 5);
        drawMouseTail(c, p, phase);
        drawMouseBackpack(c, p, phase, runPower);
        if (mood === 'idle' || mood === 'sniff') drawTinyCan(c, p, 0, 32);
        drawTinyArms(c, p, mood, phase, -38, 38, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerEyes(c, p.line, blink, mood, -16, -18, 16, -18, 9, 11);
        drawCheeks(c, p.blush, -28, -2, 28, -2);
        c.fillStyle = p.blush;
        c.beginPath();
        c.ellipse(0, -7, 5, 6, 0.2, 0, TAU);
        c.fill();
        c.strokeStyle = p.line;
        c.lineWidth = 2.2;
        c.beginPath();
        c.moveTo(-5, 6);
        c.quadraticCurveTo(0, 3, 5, 6);
        c.stroke();
        c.strokeStyle = p.line;
        c.lineWidth = 2.5;
        c.beginPath();
        c.moveTo(-35, -5);
        c.lineTo(-42, -8);
        c.moveTo(-35, 4);
        c.lineTo(-43, 4);
        c.moveTo(35, -5);
        c.lineTo(42, -8);
        c.moveTo(35, 4);
        c.lineTo(43, 4);
        c.stroke();
      }

      function drawStickerMeji(c, p, mood, phase, blink, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = Math.sin((pose.runPhase || phase) * 2);
        drawFluffyEar(c, -31, -42 + step * runPower * 3, -0.45 - runPower * 0.08, p, phase, mood);
        drawFluffyEar(c, 31, -42 - step * runPower * 3, 0.45 - runPower * 0.08, p, phase, mood);
        drawFluffyBody(c, p, phase);
        drawSideFur(c, p.line, -38, 1);
        drawSideFur(c, p.line, 38, -1);
        drawTinyArms(c, p, mood, phase, -35, 35, pose);
        drawTinyFeet(c, p, phase, mood, pose);
        drawStickerEyes(c, p.line, blink, mood, -15, -19, 15, -19, 7.5, 10);
        drawCheeks(c, p.blush, -27, 1, 27, 1);
        c.fillStyle = p.line;
        c.beginPath();
        c.ellipse(0, -4, 5, 4, 0, 0, TAU);
        c.fill();
        drawHappyMouth(c, p.line, 0, 2, true);
      }

      function drawLongEar(c, x, y, rot, fill, inner, line) {
        c.save();
        c.translate(x, y);
        c.rotate(rot);
        c.beginPath();
        c.ellipse(0, 0, 12, 42, 0, 0, TAU);
        outline(c, fill, line, 5);
        c.beginPath();
        c.ellipse(0, 2, 5, 28, 0, 0, TAU);
        outline(c, inner, line, 1.2);
        c.restore();
      }

      function drawRoundEar(c, x, y, rx, ry, fill, inner, line) {
        c.beginPath();
        c.ellipse(x, y, rx, ry, 0, 0, TAU);
        outline(c, fill, line, 5);
        c.beginPath();
        c.ellipse(x, y + 1, rx * 0.48, ry * 0.48, 0, 0, TAU);
        outline(c, inner, line, 1.2);
      }

      function drawCatEar(c, x, y, dir, fill, inner, line, phase, mood) {
        const wiggle = Math.sin(phase * 1.2) * (mood === 'chase' ? 4 : 1);
        c.beginPath();
        c.moveTo(x - dir * 13, y + 14);
        c.lineTo(x, y - 19 + wiggle);
        c.lineTo(x + dir * 20, y + 13);
        c.closePath();
        outline(c, fill, line, 5);
        c.beginPath();
        c.moveTo(x - dir * 5, y + 8);
        c.lineTo(x, y - 5 + wiggle * 0.3);
        c.lineTo(x + dir * 9, y + 8);
        c.closePath();
        outline(c, inner, line, 1.2);
      }

      function drawFlopEar(c, x, y, rot, fill, inner, line) {
        c.save();
        c.translate(x, y);
        c.rotate(rot);
        c.beginPath();
        c.ellipse(0, 0, 14, 25, 0, 0, TAU);
        outline(c, fill, line, 5);
        c.beginPath();
        c.ellipse(0, 2, 7, 14, 0, 0, TAU);
        outline(c, inner, line, 1.1);
        c.restore();
      }

      function drawFluffyEar(c, x, y, rot, p, phase, mood) {
        c.save();
        c.translate(x, y);
        c.rotate(rot + Math.sin(phase) * (mood === 'chase' ? 0.08 : 0.02));
        c.beginPath();
        c.ellipse(0, 0, 13, 24, 0, 0, TAU);
        outline(c, p.body, p.line, 5);
        c.beginPath();
        c.ellipse(0, -1, 7, 15, 0, 0, TAU);
        outline(c, p.earInner, p.line, 1.2);
        c.restore();
      }

      function drawOvalBody(c, x, y, rx, ry, fill, line, width) {
        c.beginPath();
        c.ellipse(x, y, rx, ry, 0, 0, TAU);
        outline(c, fill, line, width);
      }

      function drawFluffyBody(c, p, phase) {
        c.beginPath();
        c.ellipse(0, -10, 45, 49, 0, 0, TAU);
        outline(c, p.body, p.line, 5);
        c.save();
        c.fillStyle = p.body;
        c.strokeStyle = p.line;
        c.lineWidth = 3;
        for (let i = 0; i < 7; i++) {
          const a = -Math.PI + i * Math.PI / 3;
          const x = Math.cos(a) * 41;
          const y = -8 + Math.sin(a) * 44;
          c.beginPath();
          c.arc(x, y, 9 + Math.sin(phase + i) * 1.5, 0, TAU);
          c.fill();
          c.stroke();
        }
        c.restore();
      }

      function drawTinyArms(c, p, mood, phase, lx, rx, pose = {}) {
        const runPower = pose.runPower || 0;
        const runStep = Math.sin((pose.runPhase || phase) * 2);
        const wave = Math.sin(phase * 1.8) * (mood === 'chase' || mood === 'excited' ? 10 : 3);
        const lift = mood === 'excited' ? 16 : mood === 'chase' ? 8 : 0;
        const leftSwing = runStep * 26 * runPower;
        const rightSwing = -runStep * 26 * runPower;
        const leftEndX = lx - 11 - runPower * 13;
        const rightEndX = rx + 11 + runPower * 13;
        const leftEndY = 15 - lift + wave * 0.2 - leftSwing * 0.55;
        const rightEndY = 15 - lift - wave * 0.2 - rightSwing * 0.55;
        c.strokeStyle = p.line;
        c.lineWidth = 9;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(-31, 3);
        c.quadraticCurveTo(-42 - runPower * 8, 8 - lift * 0.3 + leftSwing * 0.18, leftEndX, leftEndY);
        c.moveTo(31, 3);
        c.quadraticCurveTo(42 + runPower * 8, 8 - lift * 0.3 + rightSwing * 0.18, rightEndX, rightEndY);
        c.stroke();
        c.strokeStyle = p.body;
        c.lineWidth = 5;
        c.beginPath();
        c.moveTo(-31, 3);
        c.quadraticCurveTo(-42 - runPower * 8, 8 - lift * 0.3 + leftSwing * 0.18, leftEndX, leftEndY);
        c.moveTo(31, 3);
        c.quadraticCurveTo(42 + runPower * 8, 8 - lift * 0.3 + rightSwing * 0.18, rightEndX, rightEndY);
        c.stroke();
      }

      function drawTinyFeet(c, p, phase, mood, pose = {}) {
        const runPower = pose.runPower || 0;
        const step = (mood === 'chase' || mood === 'excited' ? Math.sin(phase * 1.9) * 5 : 0) + Math.sin((pose.runPhase || phase) * 2) * 23 * runPower;
        const stride = runPower * 20;
        c.beginPath();
        c.ellipse(-17 - stride + step * 0.42, 36 - Math.max(0, -step) * 0.45, 12 + runPower * 3, 8, -0.22 - runPower * 0.28, 0, TAU);
        outline(c, p.body, p.line, 3);
        c.beginPath();
        c.ellipse(17 + stride - step * 0.42, 36 - Math.max(0, step) * 0.45, 12 + runPower * 3, 8, 0.22 + runPower * 0.28, 0, TAU);
        outline(c, p.body, p.line, 3);
      }

      function drawStickerFace(c, p, mood, blink, cfg) {
        const [[lx, ly], [rx, ry]] = cfg.eyes;
        drawStickerEyes(c, p.line, blink, mood, lx, ly, rx, ry, 5.5, 7.5);
        if (cfg.style === 'cat') drawCatMouth(c, p.line, cfg.mouth[0], cfg.mouth[1], mood);
        else if (cfg.style === 'shy') drawTinyMouth(c, p.line, cfg.mouth[0], cfg.mouth[1], mood);
        else drawHappyMouth(c, p.line, cfg.mouth[0], cfg.mouth[1], mood === 'excited' || mood === 'chase');
      }

      function drawStickerEyes(c, color, blink, mood, lx, ly, rx, ry, ew, eh) {
        c.fillStyle = color;
        c.strokeStyle = color;
        if (mood === 'teased') {
          c.lineWidth = 3.2;
          c.beginPath();
          c.moveTo(lx - 7, ly - 4);
          c.lineTo(lx + 7, ly + 3);
          c.moveTo(lx + 7, ly - 4);
          c.lineTo(lx - 7, ly + 3);
          c.moveTo(rx - 7, ry - 4);
          c.lineTo(rx + 7, ry + 3);
          c.moveTo(rx + 7, ry - 4);
          c.lineTo(rx - 7, ry + 3);
          c.stroke();
          return;
        }
        if (blink > 0.45) {
          c.lineWidth = 3;
          c.beginPath();
          c.moveTo(lx - ew, ly);
          c.quadraticCurveTo(lx, ly + 3, lx + ew, ly);
          c.moveTo(rx - ew, ry);
          c.quadraticCurveTo(rx, ry + 3, rx + ew, ry);
          c.stroke();
          return;
        }
        c.beginPath();
        c.ellipse(lx, ly, ew, eh, 0, 0, TAU);
        c.ellipse(rx, ry, ew, eh, 0, 0, TAU);
        c.fill();
        c.strokeStyle = '#fff';
        c.lineWidth = 2.2;
        c.beginPath();
        c.arc(lx + ew * 0.25, ly - eh * 0.35, Math.max(1.3, ew * 0.25), 0, TAU);
        c.arc(rx + ew * 0.25, ry - eh * 0.35, Math.max(1.3, ew * 0.25), 0, TAU);
        c.stroke();
      }

      function drawCheeks(c, color, lx, ly, rx, ry) {
        c.save();
        c.globalAlpha = 0.72;
        c.fillStyle = color;
        c.beginPath();
        c.ellipse(lx, ly, 8, 4, -0.18, 0, TAU);
        c.ellipse(rx, ry, 8, 4, 0.18, 0, TAU);
        c.fill();
        c.restore();
      }

      function drawHappyMouth(c, line, x, y, open) {
        c.strokeStyle = line;
        c.lineWidth = 2.8;
        c.beginPath();
        c.moveTo(x - 7, y);
        c.quadraticCurveTo(x, y + 9, x + 7, y);
        c.stroke();
        if (open) {
          c.fillStyle = '#ff7f8f';
          c.beginPath();
          c.ellipse(x + 1, y + 7, 5, 4, 0, 0, TAU);
          c.fill();
        }
      }

      function drawCatMouth(c, line, x, y, mood) {
        c.strokeStyle = line;
        c.lineWidth = 2.7;
        c.beginPath();
        c.moveTo(x - 8, y);
        c.quadraticCurveTo(x - 3, y + 7, x, y + 2);
        c.quadraticCurveTo(x + 3, y + 7, x + 8, y);
        c.stroke();
      }

      function drawTinyMouth(c, line, x, y, mood) {
        c.strokeStyle = line;
        c.lineWidth = 2.5;
        c.beginPath();
        if (mood === 'teased') {
          c.moveTo(x - 5, y + 3);
          c.quadraticCurveTo(x, y - 1, x + 5, y + 3);
        } else {
          c.moveTo(x - 5, y);
          c.quadraticCurveTo(x, y + 4, x + 5, y);
        }
        c.stroke();
      }

      function drawMouseTail(c, p, phase) {
        c.save();
        c.strokeStyle = p.line;
        c.lineWidth = 6;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(-44, 22);
        c.quadraticCurveTo(-71, 21 + Math.sin(phase) * 4, -68, 40);
        c.stroke();
        c.strokeStyle = p.body;
        c.lineWidth = 3.5;
        c.beginPath();
        c.moveTo(-44, 22);
        c.quadraticCurveTo(-71, 21 + Math.sin(phase) * 4, -68, 40);
        c.stroke();
        c.restore();
      }

      function drawMouseBackpack(c, p, phase, runPower) {
        c.save();
        c.translate(39, 10 + Math.sin(phase * 1.4) * runPower * 2);
        c.rotate(0.12);
        c.beginPath();
        c.roundRect?.(-7, -18, 18, 34, 7);
        if (!c.roundRect) c.rect(-7, -18, 18, 34);
        outline(c, p.outfit, p.line, 2.5);
        c.strokeStyle = p.line;
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(-4, -9);
        c.quadraticCurveTo(5, -2, -3, 8);
        c.stroke();
        c.restore();
      }

      function drawSideFur(c, line, x, dir) {
        c.save();
        c.strokeStyle = line;
        c.lineWidth = 2.6;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(x, -2);
        c.lineTo(x + dir * 9, -5);
        c.moveTo(x, 7);
        c.lineTo(x + dir * 8, 8);
        c.moveTo(x, 15);
        c.lineTo(x + dir * 7, 18);
        c.stroke();
        c.restore();
      }

      function drawHachiwareCapLine(c, p) {
        c.save();
        c.strokeStyle = p.line;
        c.lineWidth = 2.4;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(-18, -37);
        c.quadraticCurveTo(-10, -25, 0, -18);
        c.quadraticCurveTo(10, -25, 18, -37);
        c.stroke();
        c.restore();
      }

      function drawTinyCan(c, p, x, y) {
        c.save();
        c.translate(x, y);
        c.beginPath();
        c.roundRect?.(-17, -9, 34, 18, 5);
        if (!c.roundRect) {
          c.rect(-17, -9, 34, 18);
        }
        outline(c, '#f4f7fb', p.line, 2.5);
        c.fillStyle = '#3c78b5';
        c.fillRect(-14, -2, 28, 6);
        c.strokeStyle = p.line;
        c.lineWidth = 1.6;
        c.beginPath();
        c.ellipse(0, -9, 16, 5, 0, 0, TAU);
        c.stroke();
        c.restore();
      }

      function drawStickerOrbitDots(c, p, phase) {
        c.save();
        c.fillStyle = p.accent;
        c.globalAlpha = 0.88;
        for (let i = 0; i < 4; i++) {
          const a = phase * 1.7 + i * Math.PI * 0.5;
          c.beginPath();
          c.arc(Math.cos(a) * 57, -24 + Math.sin(a) * 22, 4.5, 0, TAU);
          c.fill();
        }
        c.restore();
      }

      function drawQuestionPop(c, p, phase) {
        c.save();
        c.translate(34, -74 + Math.sin(phase * 2) * 2);
        c.fillStyle = '#ffdce5';
        c.strokeStyle = p.line;
        c.lineWidth = 3;
        c.beginPath();
        c.ellipse(0, 0, 17, 14, 0, 0, TAU);
        c.fill();
        c.stroke();
        c.fillStyle = p.line;
        c.font = '900 21px -apple-system, sans-serif';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText('?', 0, 1);
        c.restore();
      }

      function drawSniffMarks(c, p, phase) {
        c.save();
        c.strokeStyle = p.line;
        c.lineWidth = 2;
        c.globalAlpha = 0.55 + Math.sin(phase * 2) * 0.18;
        c.beginPath();
        c.arc(38, -13, 7, -0.8, 0.8);
        c.arc(49, -16, 9, -0.8, 0.8);
        c.stroke();
        c.restore();
      }

      function drawRunStreaks(c, p, phase, power) {
        if (power <= 0.08) return;
        c.save();
        c.globalAlpha = 0.16 + power * 0.22;
        c.strokeStyle = p.line;
        c.lineWidth = 2.2;
        c.lineCap = 'round';
        const wobble = Math.sin(phase * 2) * 4;
        for (let i = 0; i < 3; i++) {
          const y = 8 + i * 13 + wobble * (i === 1 ? -0.4 : 0.25);
          const len = 16 + power * 26 - i * 4;
          c.beginPath();
          c.moveTo(-58 - i * 8, y);
          c.lineTo(-58 - i * 8 - len, y + 2);
          c.stroke();
        }
        c.restore();
      }

      function drawCharacter(targetCtx, x, y, s, character, pose) {
        const p = character.palette;
        const mood = pose.mood;
        const facing = pose.facing;
        const phase = pose.phase;
        const blink = pose.blink;
        const squish = pose.squish;
        const shy = pose.shy || 0;
        const wild = character.temperament === 'wild';
        const dog = character.temperament === 'dog';
        const kind = character.temperament === 'kind';
        const isHachi = character.id === 'hachiware';
        const isChiikawa = character.id === 'chiikawa';

        targetCtx.save();
        targetCtx.translate(x, y);
        targetCtx.scale(s * facing, s);

        targetCtx.save();
        targetCtx.scale(1 + squish, 1 - squish * 0.65);

        targetCtx.globalAlpha = 0.26;
        targetCtx.fillStyle = '#2f2116';
        targetCtx.beginPath();
        targetCtx.ellipse(0, 46, 46, 12, 0, 0, TAU);
        targetCtx.fill();
        targetCtx.globalAlpha = 1;

        if (wild) {
          drawUsagi(targetCtx, p, mood, phase, blink);
        } else if (dog) {
          drawPuppy(targetCtx, p, mood, phase, blink);
        } else if (kind) {
          drawHachiware(targetCtx, p, mood, phase, blink);
        } else {
          drawChiikawa(targetCtx, p, mood, phase, blink);
        }

        if (mood === 'excited') {
          targetCtx.save();
          targetCtx.scale(facing, 1);
          targetCtx.fillStyle = wild ? '#ffcf35' : isHachi ? '#7edfff' : isChiikawa ? '#ffbad2' : '#98df72';
          targetCtx.globalAlpha = 0.8;
          for (let i = 0; i < 3; i++) {
            const a = phase * 1.6 + i * 2.1;
            targetCtx.beginPath();
            targetCtx.arc(Math.cos(a) * 54, -48 + Math.sin(a) * 16, 4.5, 0, TAU);
            targetCtx.fill();
          }
          targetCtx.restore();
        }

        if (shy > 0) {
          targetCtx.save();
          targetCtx.globalAlpha = 0.18 * shy;
          targetCtx.fillStyle = '#fff';
          targetCtx.beginPath();
          targetCtx.ellipse(0, -8, 42, 36, 0, 0, TAU);
          targetCtx.fill();
          targetCtx.restore();
        }

        targetCtx.restore();
        targetCtx.restore();
      }

      function outline(ctx2, fill, stroke, line = 4) {
        ctx2.fillStyle = fill;
        ctx2.strokeStyle = stroke;
        ctx2.lineWidth = line;
        ctx2.lineJoin = 'round';
        ctx2.lineCap = 'round';
        ctx2.fill();
        ctx2.stroke();
      }

      function drawUsagi(c, p, mood, phase, blink) {
        const earWave = Math.sin(phase * 1.7) * (mood === 'chase' || mood === 'excited' ? 9 : 4);
        c.save();
        c.rotate(-0.18 + earWave * 0.004);
        c.beginPath();
        c.ellipse(-24, -72, 12, 45, -0.15, 0, TAU);
        outline(c, p.body, p.line, 4);
        c.beginPath();
        c.ellipse(-24, -72, 5.5, 31, -0.15, 0, TAU);
        outline(c, p.earInner, p.line, 1.4);
        c.restore();

        c.save();
        c.rotate(0.18 - earWave * 0.004);
        c.beginPath();
        c.ellipse(22, -74, 12, 45, 0.12, 0, TAU);
        outline(c, p.body, p.line, 4);
        c.beginPath();
        c.ellipse(22, -74, 5.5, 31, 0.12, 0, TAU);
        outline(c, p.earInner, p.line, 1.4);
        c.restore();

        drawRoundBody(c, p.body, p.line);
        drawBelly(c, p.outfit, p.outfitLine, mood);

        const armLift = mood === 'excited' ? 1 : mood === 'chase' ? 0.5 : 0;
        drawArm(c, -31, 0, -54, -12 - armLift * 20, p.body, p.line);
        drawArm(c, 31, 0, 54, -8 - armLift * 22, p.body, p.line);
        drawLegs(c, p.body, p.line, phase, mood);

        drawEyes(c, p.line, blink, mood, -14, -22, 14, -22);
        drawBlush(c, p.blush, -26, -9, 26, -9);
        c.strokeStyle = p.line;
        c.lineWidth = 3;
        c.beginPath();
        if (mood === 'teased') {
          c.moveTo(-8, 2);
          c.quadraticCurveTo(0, -4, 8, 2);
        } else {
          c.moveTo(-8, -1);
          c.quadraticCurveTo(-2, 9, 0, 3);
          c.quadraticCurveTo(2, 9, 8, -1);
        }
        c.stroke();
      }

      function drawPuppy(c, p, mood, phase, blink) {
        const earFlop = Math.sin(phase * 1.4) * (mood === 'chase' ? 8 : 3);
        c.save();
        c.rotate(-0.42 + earFlop * 0.012);
        c.beginPath();
        c.ellipse(-31, -39, 15, 28, -0.5, 0, TAU);
        outline(c, p.earInner, p.line, 4);
        c.restore();
        c.save();
        c.rotate(0.42 - earFlop * 0.012);
        c.beginPath();
        c.ellipse(31, -39, 15, 28, 0.5, 0, TAU);
        outline(c, p.earInner, p.line, 4);
        c.restore();

        c.save();
        c.rotate(Math.sin(phase * 2.2) * 0.28);
        c.beginPath();
        c.moveTo(36, 21);
        c.quadraticCurveTo(70, 0, 53, -18);
        c.quadraticCurveTo(70, -12, 72, 9);
        c.quadraticCurveTo(63, 35, 40, 36);
        outline(c, p.body, p.line, 4);
        c.restore();

        drawRoundBody(c, p.body, p.line);
        c.beginPath();
        c.arc(-16, -31, 15, 0, TAU);
        outline(c, p.earInner, p.line, 2.6);
        drawBelly(c, p.outfit, p.outfitLine, mood);
        drawArm(c, -31, 5, -48, 16, p.body, p.line);
        drawArm(c, 31, 5, 48, 16, p.body, p.line);
        drawLegs(c, p.body, p.line, phase, mood);
        drawEyes(c, p.line, blink, mood, -15, -21, 16, -21);
        drawBlush(c, p.blush, -27, -6, 27, -6);
        c.fillStyle = p.line;
        c.beginPath();
        c.ellipse(0, -10, 5, 4, 0, 0, TAU);
        c.fill();
        c.strokeStyle = p.line;
        c.lineWidth = 2.6;
        c.beginPath();
        if (mood === 'excited') {
          c.moveTo(-9, 2);
          c.quadraticCurveTo(0, 13, 10, 2);
        } else if (mood === 'teased') {
          c.moveTo(-8, 4);
          c.quadraticCurveTo(0, -1, 8, 4);
        } else {
          c.moveTo(-7, 1);
          c.quadraticCurveTo(0, 8, 7, 1);
        }
        c.stroke();
      }

      function drawHachiware(c, p, mood, phase, blink) {
        drawCatEars(c, p, phase, mood);
        drawRoundBody(c, p.body, p.line);
        c.save();
        c.beginPath();
        c.moveTo(-38, -39);
        c.bezierCurveTo(-18, -58, -6, -28, 0, -15);
        c.bezierCurveTo(8, -30, 18, -58, 38, -38);
        c.lineTo(38, 7);
        c.bezierCurveTo(20, -4, 9, -3, 0, 8);
        c.bezierCurveTo(-9, -3, -20, -4, -38, 7);
        c.closePath();
        outline(c, p.shade, p.line, 2.2);
        c.restore();
        drawBelly(c, p.outfit, p.outfitLine, mood);
        drawArm(c, -31, 0, -49, 11 + Math.sin(phase) * 4, p.body, p.line);
        drawArm(c, 31, 0, 49, 3 - (mood === 'excited' ? 18 : 0), p.body, p.line);
        drawLegs(c, p.body, p.line, phase, mood);
        drawEyes(c, p.line, blink, mood, -15, -19, 15, -19);
        drawBlush(c, p.blush, -28, -4, 28, -4);
        c.strokeStyle = p.line;
        c.lineWidth = 2.6;
        c.beginPath();
        c.moveTo(-8, 0);
        c.quadraticCurveTo(0, 8, 8, 0);
        c.stroke();
      }

      function drawChiikawa(c, p, mood, phase, blink) {
        c.beginPath();
        c.ellipse(-25, -50, 13, 18, -0.15, 0, TAU);
        outline(c, p.body, p.line, 4);
        c.beginPath();
        c.ellipse(25, -50, 13, 18, 0.15, 0, TAU);
        outline(c, p.body, p.line, 4);
        c.beginPath();
        c.ellipse(-25, -50, 6, 9, -0.15, 0, TAU);
        outline(c, p.earInner, p.line, 1.2);
        c.beginPath();
        c.ellipse(25, -50, 6, 9, 0.15, 0, TAU);
        outline(c, p.earInner, p.line, 1.2);
        drawRoundBody(c, p.body, p.line);
        drawBelly(c, p.outfit, p.outfitLine, mood);
        const timid = mood === 'teased' || mood === 'lost';
        drawArm(c, -28, 4, timid ? -17 : -44, timid ? 21 : 11, p.body, p.line);
        drawArm(c, 28, 4, timid ? 17 : 44, timid ? 21 : 11, p.body, p.line);
        drawLegs(c, p.body, p.line, phase, mood);
        drawEyes(c, p.line, blink, mood, -14, -20, 14, -20);
        drawBlush(c, p.blush, -27, -4, 27, -4);
        c.strokeStyle = p.line;
        c.lineWidth = 2.3;
        c.beginPath();
        if (mood === 'teased') {
          c.moveTo(-5, 5);
          c.quadraticCurveTo(0, 1, 5, 5);
        } else {
          c.moveTo(-5, 1);
          c.quadraticCurveTo(0, 5, 5, 1);
        }
        c.stroke();
      }

      function drawCatEars(c, p, phase, mood) {
        const wiggle = Math.sin(phase) * (mood === 'chase' ? 4 : 1.5);
        c.beginPath();
        c.moveTo(-34, -40);
        c.lineTo(-21, -75 + wiggle);
        c.lineTo(-4, -43);
        c.closePath();
        outline(c, p.shade, p.line, 4);
        c.beginPath();
        c.moveTo(34, -40);
        c.lineTo(21, -75 - wiggle);
        c.lineTo(4, -43);
        c.closePath();
        outline(c, p.shade, p.line, 4);
      }

      function drawRoundBody(c, fill, line) {
        c.beginPath();
        c.ellipse(0, -16, 43, 48, 0, 0, TAU);
        outline(c, fill, line, 4);
      }

      function drawBelly(c, fill, line, mood) {
        c.save();
        c.globalAlpha = mood === 'lost' ? 0.82 : 1;
        c.beginPath();
        c.ellipse(0, 13, 26, 24, 0, 0, TAU);
        outline(c, fill, line, 2.1);
        c.restore();
      }

      function drawArm(c, sx, sy, ex, ey, fill, line) {
        c.strokeStyle = line;
        c.lineWidth = 12;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(sx, sy);
        c.quadraticCurveTo((sx + ex) / 2, sy + 7, ex, ey);
        c.stroke();
        c.strokeStyle = fill;
        c.lineWidth = 7;
        c.beginPath();
        c.moveTo(sx, sy);
        c.quadraticCurveTo((sx + ex) / 2, sy + 7, ex, ey);
        c.stroke();
      }

      function drawLegs(c, fill, line, phase, mood) {
        const run = mood === 'chase' || mood === 'excited';
        const step = run ? Math.sin(phase * 1.8) * 8 : 0;
        c.beginPath();
        c.ellipse(-17 + step * 0.15, 36 + Math.max(0, step) * 0.2, 14, 10, -0.08, 0, TAU);
        outline(c, fill, line, 3);
        c.beginPath();
        c.ellipse(17 - step * 0.15, 36 + Math.max(0, -step) * 0.2, 14, 10, 0.08, 0, TAU);
        outline(c, fill, line, 3);
      }

      function drawEyes(c, color, blink, mood, lx, ly, rx, ry) {
        c.fillStyle = color;
        if (mood === 'teased') {
          c.strokeStyle = color;
          c.lineWidth = 3;
          c.beginPath();
          c.moveTo(lx - 6, ly - 2);
          c.lineTo(lx + 5, ly + 2);
          c.moveTo(rx - 5, ry + 2);
          c.lineTo(rx + 6, ry - 2);
          c.stroke();
          return;
        }
        if (blink > 0.45) {
          c.strokeStyle = color;
          c.lineWidth = 3;
          c.beginPath();
          c.moveTo(lx - 6, ly);
          c.quadraticCurveTo(lx, ly + 3, lx + 6, ly);
          c.moveTo(rx - 6, ry);
          c.quadraticCurveTo(rx, ry + 3, rx + 6, ry);
          c.stroke();
          return;
        }
        c.beginPath();
        c.ellipse(lx, ly, 4.2, 6.4, 0, 0, TAU);
        c.ellipse(rx, ry, 4.2, 6.4, 0, 0, TAU);
        c.fill();
        c.fillStyle = '#fff';
        c.beginPath();
        c.arc(lx + 1.2, ly - 2, 1.2, 0, TAU);
        c.arc(rx + 1.2, ry - 2, 1.2, 0, TAU);
        c.fill();
      }

      function drawBlush(c, color, lx, ly, rx, ry) {
        c.save();
        c.globalAlpha = 0.72;
        c.fillStyle = color;
        c.beginPath();
        c.ellipse(lx, ly, 8, 4, -0.18, 0, TAU);
        c.ellipse(rx, ry, 8, 4, 0.18, 0, TAU);
        c.fill();
        c.restore();
      }

      function spawnDust(x, y, character) {
        state.particles.push({
          type: 'dust',
          x,
          y,
          vx: (Math.random() - 0.5) * 1.4 - buddy.facing * 0.6,
          vy: -Math.random() * 1.1,
          life: 1,
          size: 5 + Math.random() * 5,
          color: character.palette.shade
        });
      }

      function spawnSpark(x, y, character, mood) {
        state.particles.push({
          type: mood === 'teased' ? 'pop' : 'spark',
          x: x + (Math.random() - 0.5) * 50,
          y: y + (Math.random() - 0.5) * 34,
          vx: (Math.random() - 0.5) * 2,
          vy: -1.6 - Math.random() * 1.4,
          life: 1,
          size: 5 + Math.random() * 7,
          rot: Math.random() * TAU,
          color: mood === 'teased' ? character.palette.coral || '#ff8a72' : character.palette.accent
        });
      }

      function spawnPop(x, y, character) {
        for (let i = 0; i < 20; i++) spawnSpark(x, y, character, 'happy');
      }

      function spawnBubble(x, y, text, character) {
        if (!text) return;
        state.bubbles.push({
          x,
          y,
          text,
          life: 1,
          vy: -0.48,
          color: character.palette.accent
        });
      }

      function updateParticles() {
        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.035;
          p.life -= p.type === 'dust' ? 0.028 : 0.018;
          if (p.life <= 0) {
            state.particles.splice(i, 1);
            continue;
          }
          ctx.save();
          ctx.globalAlpha = clamp(p.life, 0, 1);
          if (p.type === 'dust') {
            ctx.fillStyle = p.color;
            ctx.globalAlpha *= 0.34;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (1.2 - p.life), 0, TAU);
            ctx.fill();
          } else if (p.type === 'spark') {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            drawStar(ctx, p.size, p.color);
          } else {
            ctx.strokeStyle = '#ff705d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(p.x - p.size, p.y - p.size);
            ctx.lineTo(p.x + p.size, p.y + p.size);
            ctx.moveTo(p.x + p.size, p.y - p.size);
            ctx.lineTo(p.x - p.size, p.y + p.size);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawStar(c, size, color) {
        c.fillStyle = color;
        c.beginPath();
        for (let i = 0; i < 8; i++) {
          const r = i % 2 ? size * 0.38 : size;
          const a = -Math.PI / 2 + i * Math.PI / 4;
          c.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        c.closePath();
        c.fill();
      }

      function updateBubbles() {
        for (let i = state.bubbles.length - 1; i >= 0; i--) {
          const b = state.bubbles[i];
          b.x += Math.sin(b.life * 7) * 0.22;
          b.y += b.vy;
          b.life -= 0.014;
          if (b.life <= 0) {
            state.bubbles.splice(i, 1);
            continue;
          }
          drawBubble(b);
        }
      }

      function drawBubble(b) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, b.life * 1.8);
        ctx.font = '800 14px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
        const w = Math.min(state.width - 32, ctx.measureText(b.text).width + 28);
        const h = 32;
        const x = clamp(b.x - w / 2, 12, state.width - w - 12);
        const y = clamp(b.y - h / 2, 58, state.height - h - 12);
        roundRect(ctx, x, y, w, h, 8);
        ctx.fillStyle = 'rgba(255, 250, 242, 0.92)';
        ctx.fill();
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#2f2116';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.text, x + w / 2, y + h / 2 + 0.5, w - 18);
        ctx.restore();
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y);
        c.lineTo(x + w - r, y);
        c.quadraticCurveTo(x + w, y, x + w, y + r);
        c.lineTo(x + w, y + h - r);
        c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        c.lineTo(x + r, y + h);
        c.quadraticCurveTo(x, y + h, x, y + h - r);
        c.lineTo(x, y + r);
        c.quadraticCurveTo(x, y, x + r, y);
      }

      function setPointerTarget(x, y, active = true, source = state.mode) {
        const now = performance.now();
        const raw = { x: clamp(x, 0, state.width), y: clamp(y, 0, state.height) };
        const previousRaw = state.rawTarget || raw;
        const frameScale = clamp((now - (state.lastTargetTime || now)) / 16.7, 0.5, 3);
        const rawVelocity = {
          x: (raw.x - previousRaw.x) / frameScale,
          y: (raw.y - previousRaw.y) / frameScale
        };
        const speed = Math.hypot(rawVelocity.x, rawVelocity.y);
        const isCamera = source === 'camera';
        const alpha = isCamera ? clamp(0.24 + speed / 95, 0.24, 0.68) : 0.78;
        const current = state.target || raw;
        const smooth = {
          x: lerp(current.x, raw.x, alpha),
          y: lerp(current.y, raw.y, alpha)
        };
        const predict = isCamera ? 0.16 : 0.04;
        const next = {
          x: clamp(smooth.x + rawVelocity.x * predict, 0, state.width),
          y: clamp(smooth.y + rawVelocity.y * predict, 0, state.height)
        };
        if (state.target) {
          state.targetVelocity.x = next.x - state.target.x;
          state.targetVelocity.y = next.y - state.target.y;
        } else {
          state.targetVelocity.x = 0;
          state.targetVelocity.y = 0;
        }
        state.rawTarget = raw;
        state.lastTarget = state.target;
        state.lastTargetTime = now;
        state.target = next;
        state.ghostTarget = { x: next.x, y: next.y };
        state.ghostVelocity.x = state.targetVelocity.x;
        state.ghostVelocity.y = state.targetVelocity.y;
        state.targetActive = active;
        state.lastSeen = now;
        state.lostStartedAt = 0;
        state.lostQuestionShown = false;
        if (active) state.hasSeenTarget = true;
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[data-src="${src}"]`);
          if (existing?.dataset.loaded === 'true') {
            resolve();
            return;
          }
          const script = existing || document.createElement('script');
          script.src = src;
          script.dataset.src = src;
          script.crossOrigin = 'anonymous';
          script.onload = () => {
            script.dataset.loaded = 'true';
            resolve();
          };
          script.onerror = () => reject(new Error(`加载失败：${src}`));
          if (!existing) document.head.appendChild(script);
        });
      }

      async function ensureMediaPipe() {
        if (window.Hands && window.Camera) return;
        const sources = [
          {
            camera: 'https://registry.npmmirror.com/@mediapipe/camera_utils/latest/files/camera_utils.js',
            hands: 'https://registry.npmmirror.com/@mediapipe/hands/latest/files/hands.js'
          },
          {
            camera: 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js',
            hands: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js'
          }
        ];
        let lastError = null;
        for (const source of sources) {
          try {
            await loadScript(source.camera);
            await loadScript(source.hands);
            if (window.Hands && window.Camera) return;
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error('手部识别脚本加载失败');
      }

      async function startCamera() {
        state.started = true;
        startLayer.classList.add('hide');
        setMode('camera');
        audioEngine.startSoft();
        setStatus('请求摄像头权限', false);

        try {
          if (!navigator.mediaDevices?.getUserMedia) throw new Error('当前浏览器不支持摄像头');
          setStatus('加载手部识别模型', false);
          await ensureMediaPipe();
          setStatus('请求摄像头权限', false);

          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: 'user',
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });
          video.srcObject = stream;
          await video.play();

          const hands = new Hands({
            locateFile: (file) => `https://registry.npmmirror.com/@mediapipe/hands/latest/files/${file}`
          });
          hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,
            minDetectionConfidence: 0.42,
            minTrackingConfidence: 0.28
          });
          hands.onResults((results) => {
            state.frameReady = true;
            handleHands(results.multiHandLandmarks || []);
          });

          const camera = new Camera(video, {
            width: 960,
            height: 540,
            onFrame: async () => {
              const now = performance.now();
              if (now - state.lastHandsSentAt < 30) return;
              state.lastHandsSentAt = now;
              await hands.send({ image: video });
            }
          });
          await camera.start();
          state.hands = hands;
          state.camera = camera;
          state.cameraReady = true;
          setStatus('摄像头运行中', true);
          showToast('乌萨奇看见你啦');
        } catch (error) {
          console.warn(error);
          setMode('touch');
          setStatus('已切到触摸模式', true);
          showToast('先从触摸模式撒欢');
        }
      }

      function handleHands(allHands) {
        if (state.mode !== 'camera') return;
        let best = null;
        for (const hand of allHands) {
          const tip = hand[8];
          const dip = hand[7];
          const pip = hand[6];
          const mcp = hand[5];
          const palm = hand[9];
          const wrist = hand[0];
          if (!tip || !dip || !pip || !mcp || !palm || !wrist) continue;
          const reachTip = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
          const reachPip = Math.hypot(pip.x - wrist.x, pip.y - wrist.y);
          const indexLength = Math.hypot(tip.x - mcp.x, tip.y - mcp.y);
          const foldedLength = Math.hypot(pip.x - mcp.x, pip.y - mcp.y);
          const straightness = Math.hypot(tip.x - mcp.x, tip.y - mcp.y) / Math.max(0.001, Math.hypot(dip.x - mcp.x, dip.y - mcp.y));
          const palmSize = Math.hypot(palm.x - wrist.x, palm.y - wrist.y);
          const extension = Math.max(
            reachTip / Math.max(0.001, reachPip),
            indexLength / Math.max(0.001, foldedLength)
          );
          const screen = landmarkToScreen(tip);
          const previousBonus = state.target ? 1 / (1 + Math.hypot(screen.x - state.target.x, screen.y - state.target.y) / 160) : 0.25;
          const palmBonus = clamp(palmSize * 5, 0, 0.8);
          const score = extension * 1.5 + straightness * 0.35 + previousBonus * 0.9 + palmBonus;
          if (extension < 0.94 && straightness < 1.08) continue;
          const point = { ...screen, confidence: score };
          if (!best || point.confidence > best.confidence) best = point;
        }
        if (best) {
          setPointerTarget(best.x, best.y, true, 'camera');
        } else if (performance.now() - state.lastSeen > 950) {
          state.targetActive = false;
        }
      }

      function landmarkToScreen(lm) {
        if (!video.videoWidth || !video.videoHeight) {
          return { x: (1 - lm.x) * state.width, y: lm.y * state.height };
        }
        const scale = Math.max(state.width / video.videoWidth, state.height / video.videoHeight);
        const drawW = video.videoWidth * scale;
        const drawH = video.videoHeight * scale;
        const drawX = (state.width - drawW) / 2;
        const drawY = (state.height - drawH) / 2;
        return {
          x: drawX + (1 - lm.x) * drawW,
          y: drawY + lm.y * drawH
        };
      }

      function startTouchMode() {
        state.started = true;
        startLayer.classList.add('hide');
        setMode('touch');
        audioEngine.startSoft();
        showToast('开始撒欢');
      }

      function initPointerEvents() {
        window.addEventListener('pointerdown', (event) => {
          if (event.target.closest('button, input, .settings')) return;
          if (!state.started) return;
          state.pointerDown = true;
          if (state.mode !== 'camera') setMode('touch');
          setPointerTarget(event.clientX, event.clientY, true);
          audioEngine.startSoft();
        });
        window.addEventListener('pointermove', (event) => {
          if (!state.started || event.target.closest('button, input, .settings')) return;
          if (state.mode === 'touch' || state.pointerDown) setPointerTarget(event.clientX, event.clientY, true);
        });
        window.addEventListener('pointerup', () => {
          state.pointerDown = false;
          if (state.mode === 'touch') {
            state.lastSeen = performance.now() - 350;
            state.targetActive = false;
            state.lostStartedAt = performance.now();
          }
        });
        window.addEventListener('pointercancel', () => {
          state.pointerDown = false;
        });
      }

      const audioEngine = (() => {
        let ctxAudio = null;
        let master = null;
        let timer = null;
        let step = 0;
        let playing = false;
        const bpm = 136;
        const beat = 60 / bpm;
        const melody = [0, 4, 7, 9, 12, 9, 7, 4, 5, 9, 12, 14, 16, 14, 12, 9];
        const bass = [0, 0, 5, 5, 7, 7, 4, 4];
        const scaleRoot = 261.63;

        function ensure() {
          if (ctxAudio) return;
          ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
          master = ctxAudio.createGain();
          master.gain.value = 0.0;
          master.connect(ctxAudio.destination);
        }

        function midiRatio(semi) {
          return Math.pow(2, semi / 12);
        }

        function tone(time, freq, type, duration, gainValue, pan = 0) {
          const osc = ctxAudio.createOscillator();
          const gain = ctxAudio.createGain();
          const panner = ctxAudio.createStereoPanner ? ctxAudio.createStereoPanner() : null;
          osc.type = type;
          osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(0.0001, time);
          gain.gain.exponentialRampToValueAtTime(gainValue, time + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
          if (panner) {
            panner.pan.value = pan;
            osc.connect(gain).connect(panner).connect(master);
          } else {
            osc.connect(gain).connect(master);
          }
          osc.start(time);
          osc.stop(time + duration + 0.02);
        }

        function noise(time, duration, gainValue) {
          const bufferSize = Math.floor(ctxAudio.sampleRate * duration);
          const buffer = ctxAudio.createBuffer(1, bufferSize, ctxAudio.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
          const source = ctxAudio.createBufferSource();
          const filter = ctxAudio.createBiquadFilter();
          const gain = ctxAudio.createGain();
          filter.type = 'highpass';
          filter.frequency.value = 6000;
          gain.gain.setValueAtTime(gainValue, time);
          gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
          source.buffer = buffer;
          source.connect(filter).connect(gain).connect(master);
          source.start(time);
          source.stop(time + duration);
        }

        function schedule() {
          if (!ctxAudio || !playing) return;
          const now = ctxAudio.currentTime + 0.045;
          const note = melody[step % melody.length];
          const bassNote = bass[Math.floor(step / 2) % bass.length];
          const accent = step % 4 === 0;
          tone(now, scaleRoot * 2 * midiRatio(note), 'triangle', beat * 0.72, accent ? 0.08 : 0.052, (step % 6 - 2) * 0.08);
          if (step % 2 === 0) tone(now, scaleRoot * 0.5 * midiRatio(bassNote), 'sine', beat * 1.3, 0.045, -0.18);
          if (step % 4 === 0) tone(now, 82, 'sine', 0.12, 0.13);
          if (step % 2 === 1) noise(now, 0.045, 0.035);
          if (step % 8 === 6) tone(now, scaleRoot * 3 * midiRatio(12), 'square', 0.08, 0.025, 0.28);
          step++;
        }

        function play() {
          ensure();
          ctxAudio.resume();
          playing = true;
          musicBtn.classList.add('playing');
          master.gain.cancelScheduledValues(ctxAudio.currentTime);
          master.gain.linearRampToValueAtTime(0.72, ctxAudio.currentTime + 0.35);
          if (!timer) {
            schedule();
            timer = setInterval(schedule, beat * 500);
          }
        }

        function stop() {
          if (!ctxAudio) return;
          playing = false;
          musicBtn.classList.remove('playing');
          master.gain.cancelScheduledValues(ctxAudio.currentTime);
          master.gain.linearRampToValueAtTime(0.0001, ctxAudio.currentTime + 0.25);
          clearInterval(timer);
          timer = null;
        }

        return {
          startSoft() {
            if (!playing) play();
          },
          toggle() {
            if (playing) stop();
            else play();
          }
        };
      })();

      function loop(now) {
        const dt = Math.min(0.026, (loop.last ? now - loop.last : 16.7) / 1000);
        loop.last = now;
        drawBackdrop(now);
        updateBuddy(dt);
        drawTarget();
        updateParticles();
        drawBuddy();
        updateBubbles();
        requestAnimationFrame(loop);
      }

      function bindControls() {
        settingsBtn.addEventListener('click', () => {
          const open = !settingsPanel.classList.contains('open');
          settingsPanel.classList.toggle('open', open);
          settingsBtn.setAttribute('aria-expanded', String(open));
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            settingsPanel.classList.remove('open');
            settingsBtn.setAttribute('aria-expanded', 'false');
          }
        });
        musicBtn.addEventListener('click', () => audioEngine.toggle());
        startMusicBtn.addEventListener('click', () => audioEngine.toggle());
        startCameraBtn.addEventListener('click', startCamera);
        startTouchBtn.addEventListener('click', startTouchMode);
        cameraModeBtn.addEventListener('click', () => {
          if (!state.started) return;
          if (!state.cameraReady) startCamera();
          else setMode('camera');
        });
        touchModeBtn.addEventListener('click', () => {
          if (!state.started) startTouchMode();
          else setMode('touch');
        });
        energyRange.value = String(state.energy);
        energyValue.textContent = `${state.energy}%`;
        energyRange.addEventListener('input', () => {
          state.energy = parseInt(energyRange.value, 10);
          energyValue.textContent = `${state.energy}%`;
          localStorage.setItem('usagi-chase.energy', String(state.energy));
        });
      }

      function boot() {
        resize();
        createCharacterButtons();
        bindControls();
        initPointerEvents();
        drawStartFace();
        setInterval(drawStartFace, 260);
        requestAnimationFrame(loop);
        window.addEventListener('resize', resize);
        setMood('idle', true);
      }

      boot();
    })();
  </script>
</body>
</html>
